<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>Birdie</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #faf8f3;
        color: #3a7d5d;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }
      .logo {
        font-size: 44px;
      }
      .spin {
        width: 26px;
        height: 26px;
        border: 3px solid rgba(58, 125, 93, 0.25);
        border-top-color: #3a7d5d;
        border-radius: 50%;
        animation: r 0.8s linear infinite;
      }
      @keyframes r {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- Shown briefly while the native shell loads the deployed Birdie site. -->
    <div class="wrap">
      <div class="logo">🐦</div>
      <div class="spin"></div>
    </div>
  </body>
</html>
